<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى مريم الغالية 💖 نبض قلبي</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');

        :root {
            --primary-color: #e11d48;
            --primary-hover: #be185d;
            --bg-gradient: linear-gradient(135deg, #ffe4e6 0%, #fff1f2 50%, #fecdd3 100%);
            --card-bg: rgba(255, 255, 255, 0.96);
            --text-dark: #4c0519;
            --text-muted: #881337;
            --border-color: #fda4af;
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            --shadow-md: 0 10px 25px -5px rgba(225, 29, 72, 0.1), 0 8px 10px -6px rgba(225, 29, 72, 0.1);
            --shadow-lg: 0 20px 40px -5px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 20px 12px;
            position: relative;
        }

        #dynamic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 1;
        }

        .heart-fall {
            position: absolute;
            color: var(--primary-color);
            font-size: 16px;
            animation: fall-hearts 6s linear infinite;
            pointer-events: none;
        }

        @keyframes fall-hearts {
            0% { transform: translateY(-20px) translateX(0) scale(0.5); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(105vh) translateX(50px) scale(1.2); opacity: 0; }
        }

        .touch-heart {
            position: absolute;
            pointer-events: none;
            animation: heartFade 0.8s ease-out forwards;
            z-index: 9999;
            font-size: 24px;
            color: var(--primary-color);
        }

        @keyframes heartFade {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
            100% { transform: translate(-50%, -140%) scale(1.4); opacity: 0; }
        }

        #secured-app-content {
            width: 100%;
            max-width: 480px;
            text-align: center;
            z-index: 5;
            position: relative;
        }

        .lock-card, .countdown-container, .letters-container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            padding: 35px 25px;
            border-radius: 24px;
            box-shadow: var(--shadow-md);
            border: 1px solid #ffe4e6;
            width: 100%;
            transition: var(--transition);
        }

        .envelope-icon {
            font-size: 70px;
            margin-bottom: 15px;
            display: inline-block;
            animation: floatAnimate 3s ease-in-out infinite;
        }

        @keyframes floatAnimate {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }

        h1, h2 { color: #9f1239; font-size: 26px; margin-bottom: 12px; font-weight: 700; }
        .subtitle { color: var(--text-dark); font-size: 15px; margin-bottom: 25px; font-weight: 600; }

        .password-container {
            position: relative;
            width: 100%;
            margin-bottom: 15px;
        }

        .password-container input {
            width: 100%;
            padding: 14px 20px 14px 55px;
            border: 2px solid var(--border-color);
            border-radius: 25px;
            text-align: center;
            font-size: 16px;
            outline: none;
            transition: var(--transition);
            background: rgba(255, 255, 255, 0.9);
        }

        .password-container input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(225, 29, 72, 0.15);
        }

        .toggle-password {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 20px;
            user-select: none;
            color: var(--primary-color);
            z-index: 10;
            padding: 4px;
        }

        .open-btn {
            background: linear-gradient(45deg, var(--primary-color), var(--primary-hover));
            color: white;
            border: none;
            padding: 14px 25px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            font-weight: 700;
            box-shadow: 0 6px 20px rgba(225, 29, 72, 0.3);
            transition: var(--transition);
        }

        .open-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(225, 29, 72, 0.4);
        }

        .open-btn:active { transform: translateY(0); }

        .error-msg {
            color: var(--primary-color);
            font-size: 14px;
            margin-top: 12px;
            display: none;
            font-weight: 700;
        }

        #inner-content {
            display: none;
            opacity: 0;
            transition: opacity 0.6s ease;
            width: 100%;
        }

        .back-link-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #ffe4e6;
            color: var(--primary-color);
            border: 1px solid var(--border-color);
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            font-weight: 700;
            transition: var(--transition);
            margin-bottom: 20px;
        }

        .back-link-btn:hover { background: #fecdd3; }

        .countdown-container, .letters-container { margin: 20px 0; }

        .timer {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }

        .time-box { display: flex; flex-direction: column; align-items: center; }

        .time-num {
            font-size: 26px;
            font-weight: 700;
            color: var(--primary-color);
            background: #ffe4e6;
            padding: 8px 14px;
            border-radius: 16px;
            min-width: 65px;
            box-shadow: var(--shadow-sm);
        }

        .time-label { font-size: 13px; color: var(--text-dark); margin-top: 8px; font-weight: 700; }
        .letter-text { font-size: 16px; color: var(--text-muted); font-weight: 700; line-height: 1.8; min-height: 60px; transition: opacity 0.4s ease; }

        .gallery {
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin-top: 20px;
            width: 100%;
        }

        .photo-card {
            background: white;
            padding: 12px;
            padding-bottom: 18px;
            border-radius: 20px;
            box-shadow: var(--shadow-sm);
            border: 1px solid #ffe4e6;
            width: 100%;
            opacity: 0;
            transform: translateY(30px);
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.6s ease;
            cursor: pointer;
            overflow: hidden;
        }

        .photo-card.visible { opacity: 1; transform: translateY(0); }
        .photo-card:hover { transform: translateY(-5px) scale(1.02); box-shadow: var(--shadow-lg); }

        .photo-card img {
            width: 100%;
            height: 320px;
            object-fit: cover;
            border-radius: 16px;
            background: #fff5f5;
            display: block;
            transition: var(--transition);
        }

        .photo-caption { font-size: 15px; color: var(--text-dark); margin-top: 14px; font-weight: 700; }

        .admin-trigger {
            position: fixed;
            bottom: 15px;
            left: 15px;
            width: 35px;
            height: 35px;
            background: rgba(225, 29, 72, 0.08);
            border-radius: 50%;
            cursor: pointer;
            z-index: 9999;
            transition: var(--transition);
        }

        .admin-trigger:hover { background: rgba(225, 29, 72, 0.2); }

        #admin-panel {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px 25px;
